name: Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - lambda/**
      - terraform/**
      - .github/workflows/**

env:
  AWS_REGION:     eu-west-1
  ECR_REPOSITORY: kita-bot
  FUNCTION_NAME:  kita-bot

jobs:
  # ── CI — runs on both develop and main ──────────────────────────────────────
  ci:
    name: Plan & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Create tfvars from secrets
        working-directory: terraform
        env:
          SCHEDULE_CRON: ${{ secrets.SCHEDULE_CRON }}
        run: |
          cat > terraform.tfvars <<EOF
          child_name            = "${{ secrets.CHILD_NAME }}"
          attendee_name         = "${{ secrets.ATTENDEE_NAME }}"
          attendee_email        = "${{ secrets.ATTENDEE_EMAIL }}"
          notify_recipients     = "${{ secrets.NOTIFY_RECIPIENTS }}"
          kita_sender           = "${{ secrets.KITA_SENDER }}"
          kita_subject_keywords = "${{ secrets.KITA_SUBJECT_KEYWORDS }}"
          schedule_cron         = "${SCHEDULE_CRON:-cron(19 7 ? * MON-FRI *)}"
          EOF

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      - name: Docker Build (validate)
        run: docker build --platform linux/amd64 --provenance=false -t kita-bot lambda/

  # ── CD — runs on main only, requires CI to pass ──────────────────────────────
  deploy:
    name: Deploy
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 --provenance=false \
            --cache-from $REGISTRY/$ECR_REPOSITORY:latest \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest \
            lambda/
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --image-uri ${{ steps.build.outputs.image }} \
            --region $AWS_REGION

      - name: Wait for Lambda update to complete
        run: aws lambda wait function-updated --function-name $FUNCTION_NAME --region $AWS_REGION

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Create tfvars from secrets
        working-directory: terraform
        env:
          SCHEDULE_CRON: ${{ secrets.SCHEDULE_CRON }}
        run: |
          cat > terraform.tfvars <<EOF
          child_name            = "${{ secrets.CHILD_NAME }}"
          attendee_name         = "${{ secrets.ATTENDEE_NAME }}"
          attendee_email        = "${{ secrets.ATTENDEE_EMAIL }}"
          notify_recipients     = "${{ secrets.NOTIFY_RECIPIENTS }}"
          kita_sender           = "${{ secrets.KITA_SENDER }}"
          kita_subject_keywords = "${{ secrets.KITA_SUBJECT_KEYWORDS }}"
          schedule_cron         = "${SCHEDULE_CRON:-cron(19 7 ? * MON-FRI *)}"
          EOF

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
